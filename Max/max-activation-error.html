<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="img/favicon.ico" rel="shortcut icon" type="image/x-icon">
    <title>Max | Now TV</title>
    <link rel="stylesheet" href="../css/master.css">
    <link rel="stylesheet" href="../css/activationPage.css">

</head>

<body>

    <div class="page-wrapper">
        <div class="container">

            <div class="activationPage-wrapper">

                <img src="../img/max/max-logo.png" alt="" class="logo">
                
                <div class="name">
                    <h2 class="name">Hi, Wilson!</h2>
                </div>

                
                <div class="status-content">
                    <div class="message">
                        <p>Apologies, seems there is an error. We are unable to retrieve the information at the moment.<br><br>Please try again later.</p>
                    </div>

                    <!-- <div class="cta-buttons">
                        <a href="#" class="btn primary">Now TV Home</a>
                    </div> -->
    
                    <div class="preview-img">
                        <img src="../img/max/max-preview-image-v2.jpg" alt="">
                    </div>
                </div>

                <!-- loading -->
                <div class="loading-wrapper show">
                    <div class="spinner-border" role="status">
                        <span class="sr-only">Loading...</span>
                    </div>
                </div>
                <!-- end of loading -->

            </div>

        </div>

    </div>

    <script src="../js/jquery-3.6.4.min.js"></script>
    <script>
        setTimeout(function () {
          $('.status-content').fadeIn('fast');
          $('.loading-wrapper').removeClass('show');
        }, 1500);
    </script>

</body>

</html>
